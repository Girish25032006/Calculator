<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>
<style>
  .wholediv{
    padding: 30px;
    border-radius: 6px;
    border: 1px solid black;
    background-color: rgb(7, 245, 237);
  }
  body{
    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    background-color: rgb(174, 255, 93);
    
  }
  .maindiv button{
    margin-top: 6px;
    height: 25px;
    width: 60px;
    margin-right: 4px;
    border-radius: 4px;
    border: none;
    font-size: 18px;
    
  }
  .maindiv input{
    height: 30px;
    width: 258px;
    border: none;
    background-color: rgb(174, 255, 93);
    border-radius: 8px;
    font-size: 20px;
  }
  .button{
    color: rgb(0, 21, 255);
    background-color: rgb(174, 255, 93);
  }
  .buttoncolor{
    color:white;
    background-color: rgb(221, 84, 255);
  }
</style>
<body>
  <div class="wholediv">
    <div class="maindiv">
      <input type="text" class="input">
      <div>
        <button  onclick="calculate('7');">7</button>
        <button  onclick="calculate('8');">8</button>
        <button  onclick="calculate('9');">9</button>
        <button  onclick="calculate('*');" class="button">x</button>
      </div>
      <div>
        <button  onclick="calculate('4');">4</button>
        <button  onclick="calculate('5');">5</button>
        <button  onclick="calculate('6');">6</button>
        <button  onclick="calculate('-');" class="button">-</button>
      </div>
      <div>
        <button  onclick="calculate('1');">1</button>
        <button  onclick="calculate('2');">2</button>
        <button  onclick="calculate('3');">3</button>
        <button  onclick="calculate('+');" class="button">+</button>
      </div>
      <div>
        <button  onclick="calculate('0');">0</button>
        <button  onclick="calculate('00');">00</button>
        <button  onclick="calculate('.');">.</button>
        <button  onclick="calculate('/');" class="button">/</button>
      </div>
      <div>
        <button onclick="clearbutton();" class="button">AC</button>
        <button onclick="calculate('%');" class="button">%</button>
        <button onclick="answer('=');" class="buttoncolor">=</button>
      </div>
    </div>
  </div>
  <script>
    let input=document.querySelector('.input');
    function calculate(value){
      input.value=input.value+value;
    }
    function answer(){
      try{
        input.value=eval(input.value);
      }
      catch(error){
        input.value='ERROR'
      }
    }
    function clearbutton(){
      input.value='';
    }
    
  </script>
  
</body>
</html>
